<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Market Update</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">


<div class="coin rupee">₹</div>
<div class="coin dollar">$</div>
<div class="coin dollar">€</div>

<div class="logo">
<img src="pandamoney.png" alt="Pandamoney Logo">
</div>

<div class="market-title">
<h1>MARKET UPDATE</h1>
<div class="market-line"></div>
</div>


<div class="line"></div>

<p class="headline">
Rupee Hits All Time Low With
<br>
<span>1€</span> Being Equivalent To
</p>

<div class="rates">

<div class="box">
<h3>YESTERDAY</h3>
<span id="yesterday">₹0.00</span>
</div>

<div class="center-circle">📈</div>

<div class="box">
<h3>TODAY</h3>
<span id="today">₹0.00</span>
</div>

</div>

<div class="history-box" id="historyBox"></div>

<div id="status" class="status">
Checking Market...
</div>

<div class="footer">
REAL TIME • RELIABLE • TRUSTED
</div>

</div>

<script src="script.js"></script>

</body>
</html>
